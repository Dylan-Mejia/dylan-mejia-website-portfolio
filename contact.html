    <main>
        <section id="contact">
            <h2>Contact</h2>
            <p>These are several ways you can contact me!</p>

            <div class="social-icons">
                <a href="mailto:dylanmejia004@gmail.com" target="_blank" class="social-icon">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg" alt="Gmail" class="icon">
                </a>
                <a href="https://www.linkedin.com/in/dylan-mejia-47b720309/" target="_blank" class="social-icon">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn" class="icon">
                </a>
                <a href="https://github.com/Dylan-Mejia" target="_blank" class="social-icon">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub" class="icon">
                </a>
            </div>
        </section>

        <section id="message-form">
            <h2>Send Me A Message</h2>
            <form id="contact-form" action="https://formspree.io/f/yourformid" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
      
    </main>
